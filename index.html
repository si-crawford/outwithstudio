<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outwith</title>

  <link rel="icon" type="image/png" href="Outwith_Avatar.png">

  <style>
    html, body {
      margin: 0;
      overflow-x: hidden;
      font-family: Avenir, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #111;
      color: white;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      overflow-x: hidden;
    }

    /* --- ANIMATIONS --- */

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- HEADER --- */

    header {
      display: flex;
      justify-content: space-between;
      align-items: top;
      padding-top: 40px;
      padding-bottom: 40px;
      animation: fadeInDown 1.2s ease-out forwards;
    }

    header img {
      height: 40px;
    }

    /* --- MAIN --- */

    main img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto 80px auto;
    }

    .image-wrapper {
      overflow: hidden;
    }

    /* --- FOOTER --- */

    footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 40px;
      font-size: 14px;
      color: #ddd;
      opacity: 0;
      animation: fadeInUp 1.2s ease-out 0.3s forwards;
    }

    .footer-left {
      max-width: 320px;
      line-height: 1.6;
    }

    .footer-left p {
      margin-top: 0;
      margin-bottom: 16px;
    }

    /* REFINED SEMIBOLD LINE */
    .footer-left .lead {
      font-weight: 500; /* ✅ Refined weight (Medium) instead of Bold */
      color: #f0f0f0;   /* Slightly softer than pure white */
      margin-bottom: 16px;
    }

    .footer-left p:last-child {
      margin-bottom: 0;
    }

    .footer-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      text-align: right;
    }

    .email-link {
      color: #ddd;
      text-decoration: none;
      transition: color 0.3s;
    }

    .email-link:hover {
      color: #95edff;
    }

    a.button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #FFFCF8;
      color: #191919;
      border-radius: 80px;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.3s, color 0.3s;
    }

    a.button:hover {
      background-color: #95edff;
    }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      main img {
        margin-bottom: 40px;
        transform: scale(1.25);
        transform-origin: center;
        padding-bottom: 60px;
        padding-top: 60px;
      }
      
      footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 32px;
      }

      .footer-right {
        align-items: flex-start;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="Outwith_Logo_White.svg" alt="Outwith Logo">
    </header>

    <main>
      <div class="image-wrapper">
        <picture>
          <source srcset="outwith-mobile.gif" media="(max-width: 500px)">
          <img src="outwith-desktop.gif" alt="Work Examples">
        </picture>
      </div>
    </main>

    <footer>
      <div class="footer-left">
        <p class="lead">Outwith is currently under construction.</p>
        <p>
          While the site’s offline, you can find us on <br>
          Instagram or drop us an email.
        </p>
        <p>We look forward to sharing our <br>work with you soon!</p>
      </div>

      <div class="footer-right">
        <a href="https://www.instagram.com/outwith_studio/" class="button" target="_blank">
          Instagram
        </a>
        <a href="mailto:outwith.studio@icloud.com" class="email-link">
          outwith.studio@icloud.com
        </a>
      </div>
    </footer>
  </div>
</body>
</html>
